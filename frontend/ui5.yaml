specVersion: "3.0"
metadata:
  name: forex-platform-ui
type: application
framework:
  name: OpenUI5
  version: "1.120.17"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.uxap
    - name: sap.ui.table
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: "http://localhost:8000/api"
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /ws
      configuration:
        baseUri: "http://localhost:8000/ws"
